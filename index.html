<html lang="en">

<head>
    <meta charset="UTF-8">

    <style>
        body {
            background-color: #050505;
            font-family: 'Inter', sans-serif;
            color: #ffffff;
            margin: 0;
            overflow-x: hidden;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .neon-glow-green {
            box-shadow: 0 0 10px rgba(252, 190, 38, 0.4), 0 0 30px rgba(252, 190, 38, 0.2);
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            border: 1px border rgba(255, 255, 255, 0.05);
        }

        .text-gradient-green {
            background: linear-gradient(135deg, #FCBE26, #F9A825);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        button {
            cursor: pointer;
        }

        /* Marquee specific styles */
        .marquee-container {
            overflow: hidden;
            white-space: nowrap;
            display: flex;
            width: 100%;
        }

        .marquee-content {
            display: flex;
            animation: marquee 30s linear infinite;
            /* Adjust duration as needed */
        }

        .marquee-content:hover {
            animation-play-state: paused;
        }

        .marquee-item {
            flex-shrink: 0;
            margin: 0 1.5rem;
            /* Space between items */
            display: flex;
            align-items: center;
            justify-content: center;
        }

        @keyframes marquee {
            0% {
                transform: translateX(0%);
            }

            100% {
                transform: translateX(-100%);
            }
        }
    </style>
    <script type="importmap">
{
  "imports": {
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "lucide-react": "https://esm.sh/lucide-react@^0.562.0",
    "react/": "https://esm.sh/react@^19.2.3/",
    "react": "https://esm.sh/react@^19.2.3",

  }
}
</script>
    <link rel="stylesheet" href="/index.css">
</head>

<body class="font-sans text-white antialiased">
    <div id="root" class="flex-grow"></div>
    <style>
        /* Hide scrollbar for a cleaner look while maintaining functionality */
        html {
            scrollbar-width: thin;
            scrollbar-color: #FCBE2633 #050505;
        }
    </style>
    <script>
        // Custom Ultra-Light Smooth Scroll (Inertia)
        (function () {
            if (window.innerWidth < 1024) return; // Native on mobile for best performance

            let target = window.scrollY;
            let current = window.scrollY;
            let ease = 0.075; // The "magic" number for smoothness
            let isRunning = false;

            function update() {
                const diff = target - current;
                const delta = Math.abs(diff);

                if (delta > 0.1) {
                    current += diff * ease;
                    window.scrollTo(0, current);
                    requestAnimationFrame(update);
                } else {
                    isRunning = false;
                }
            }

            window.addEventListener('wheel', (e) => {
                if (e.ctrlKey) return;
                e.preventDefault();

                target += e.deltaY;
                target = Math.max(0, Math.min(target, document.documentElement.scrollHeight - window.innerHeight));

                if (!isRunning) {
                    isRunning = true;
                    requestAnimationFrame(update);
                }
            }, { passive: false });

            // Ensure internal links still work smoothly with inertia
            document.querySelectorAll('a[href^="#"]').forEach(anchor => {
                anchor.addEventListener('click', function (e) {
                    e.preventDefault();
                    const href = this.getAttribute('href');
                    if (href === '#' || !href) return;
                    const targetEl = document.querySelector(href);
                    if (targetEl) {
                        target = targetEl.offsetTop - 80;
                        if (!isRunning) {
                            isRunning = true;
                            requestAnimationFrame(update);
                        }
                    }
                });
            });
        })();
    </script>
    <style>
        @media only screen and (min-width: 1024px) {
            .cursor-inner {
                position: fixed;
                width: 8px;
                height: 8px;
                border-radius: 50%;
                background-color: white;
                pointer-events: none;
                z-index: 999999;
                transform: translate(-50%, -50%);
                transition: transform 0.1s ease;
            }

            .cursor-outer {
                position: fixed;
                width: 40px;
                height: 40px;
                border: 2px solid #FCBE26;
                border-radius: 50%;
                pointer-events: none;
                z-index: 999999;
                transform: translate(-50%, -50%);
            }

            /* Hide native cursor on desktop to use the custom one */
            body {
                cursor: none;
            }

            a,
            button,
            [role="button"] {
                cursor: none;
            }
        }
    </style>
    <script>
        (function () {
            if (window.innerWidth < 1024) return;

            document.body.insertAdjacentHTML('beforeend', '<div class="cursor-inner"></div><div class="cursor-outer"></div>');

            const cursorInner = document.querySelector(".cursor-inner");
            const cursorOuter = document.querySelector(".cursor-outer");

            let mouseX = 0, mouseY = 0;
            let innerX = 0, innerY = 0;
            let outerX = 0, outerY = 0;

            const lerp = (start, end, factor) => start + (end - start) * factor;

            document.addEventListener("mousemove", (e) => {
                mouseX = e.clientX;
                mouseY = e.clientY;
            });

            function animateCursor() {
                innerX = lerp(innerX, mouseX, 0.25);
                innerY = lerp(innerY, mouseY, 0.25);

                outerX = lerp(outerX, mouseX, 0.15);
                outerY = lerp(outerY, mouseY, 0.15);

                if (cursorInner) {
                    cursorInner.style.left = `${innerX}px`;
                    cursorInner.style.top = `${innerY}px`;
                }

                if (cursorOuter) {
                    cursorOuter.style.left = `${outerX}px`;
                    cursorOuter.style.top = `${outerY}px`;
                }

                requestAnimationFrame(animateCursor);
            }

            animateCursor();

            // Hover effects
            document.querySelectorAll('a, button, .group').forEach(el => {
                el.addEventListener('mouseenter', () => {
                    cursorOuter.style.transform = 'translate(-50%, -50%) scale(1.5)';
                    cursorOuter.style.backgroundColor = 'rgba(252, 190, 38, 0.1)';
                    cursorOuter.style.borderColor = '#FCBE26';
                });
                el.addEventListener('mouseleave', () => {
                    cursorOuter.style.transform = 'translate(-50%, -50%) scale(1)';
                    cursorOuter.style.backgroundColor = 'transparent';
                    cursorOuter.style.borderColor = '#FCBE26';
                });
            });
        })();
    </script>
    <script type="module" src="/index.tsx"></script>
</body>

</html>
